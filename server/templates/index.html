<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel przekierowań GSM</title>

    <link rel="icon" type="image/jpeg" href="/static/kplogoicon.jpg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<!--
What are you looking for?
-->
<div class="branding">
    <img src="/static/logokp.jpg" class="corner-logo" alt="Logo KP">
    <div class="brand-text">DUR AWH</div>
</div>

<div class="container">

    <h1>Panel przekierowań GSM</h1>
    <div class="subtitle">Zarządzanie harmonogramem przekierowań</div>

    <!-- STATUS CARD -->
    <div class="status-card">

        <div class="status-block">
            <div class="status-label">
                Aktualne przekierowanie
                <span id="activeDot" class="status-dot hidden"></span>
            </div>
            <div id="currentStatus" class="status-value">—</div>
        </div>

        <div class="status-divider"></div>

        <div class="status-block">
            <div class="status-label">Następne przekierowanie</div>
            <div id="nextStatus" class="status-value">—</div>
        </div>

    </div>

    <!-- DROPZONE -->
    <div id="dropzone" class="dropzone">
        <div class="icon">📂</div>
        <div class="text">
            Przeciągnij plik <span>.xlsx</span> lub kliknij, aby wybrać
        </div>
        <input type="file" id="fileInput" accept=".xlsx">
    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <a href="/download" class="download-btn">
            ⬇️ Pobierz aktualny harmonogram
        </a>
    </div>

    <!-- UPLOAD STATUS -->
    <div id="statusMessage" class="status hidden"></div>

</div>

<div class="watermark">made by Ignacy Chrobak</div>

<script src="/static/app.js"></script>
</body>
</html>
